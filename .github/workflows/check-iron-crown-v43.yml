name: Check Iron Crown V4.3.1

on:
  workflow_dispatch:
  push:
    paths:
      - 'public/iron-crown-1936-v4/map-v431.js'
      - 'public/iron-crown-1936-v4/core-rules-v431.js'
      - 'public/iron-crown-1936-v4/systems-v43.js'
      - 'public/iron-crown-1936-v4/engine-v431.js'
      - 'public/iron-crown-1936-v4/ux-v431.js'
      - 'public/iron-crown-1936-v4/v4-2.html'
      - '.github/workflows/check-iron-crown-v43.yml'

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax
        run: |
          node --check public/iron-crown-1936-v4/map-v431.js
          node --check public/iron-crown-1936-v4/core-rules-v431.js
          node --check public/iron-crown-1936-v4/systems-v43.js
          node --check public/iron-crown-1936-v4/engine-v431.js
          node --check public/iron-crown-1936-v4/ux-v431.js
          node --check public/iron-crown-1936-v4/engine-v422.js
          node --check public/iron-crown-1936-v4/ux-v422.js
      - name: Verify V4.3.1 references
        run: |
          grep -q 'map-v431.js' public/iron-crown-1936-v4/v4-2.html
          grep -q 'core-rules-v431.js' public/iron-crown-1936-v4/v4-2.html
          grep -q 'systems-v43.js' public/iron-crown-1936-v4/v4-2.html
          grep -q 'engine-v431.js' public/iron-crown-1936-v4/v4-2.html
          grep -q 'ux-v431.js' public/iron-crown-1936-v4/v4-2.html
          grep -q 'style-v431.css' public/iron-crown-1936-v4/v4-2.html
          ! grep -q 'map-v43.js' public/iron-crown-1936-v4/v4-2.html
          ! grep -q 'ux-v43.js' public/iron-crown-1936-v4/v4-2.html
