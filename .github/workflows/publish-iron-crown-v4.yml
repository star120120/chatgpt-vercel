name: Publish Iron Crown V4

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-iron-crown-v4.yml'
      - '.github/iron-crown-v4/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Assemble V4 package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/v4
          cat .github/iron-crown-v4/part-*.b64 | base64 -d > /tmp/iron-crown-v4.tar.gz
          echo '27dd965ca1ddd4d8082189fb191b4113b93efd45493b2b7fb6607c44bd232e8e  /tmp/iron-crown-v4.tar.gz' | sha256sum -c -
          tar -xzf /tmp/iron-crown-v4.tar.gz -C /tmp/v4
          rm -rf public/iron-crown-1936-v4
          mkdir -p public/iron-crown-1936-v4
          cp -a /tmp/v4/iron-crown-v4/. public/iron-crown-1936-v4/

      - name: Commit V4 build
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/iron-crown-1936-v4
          if git diff --cached --quiet; then
            echo 'No V4 build changes.'
            exit 0
          fi
          git commit -m 'Publish Iron Crown V4 strategy systems'
          git push
